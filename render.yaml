services:
  # ----------------------------------------------------
  # Backend Web Service
  # ----------------------------------------------------
  - type: web
    name: voyagex-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      # You MUST provide your MongoDB Atlas URI in the Render Dashboard after deploying
      - key: MONGODB_URI
        sync: false 
      # Automatically captures the frontend's URL for CORS
      - key: FRONTEND_URL
        fromService:
          type: web
          name: voyagex-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ----------------------------------------------------
  # Frontend Static Site
  # ----------------------------------------------------
  - type: web
    name: voyagex-frontend
    env: static
    # The build command runs from the root of the app directory
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      # Automatically captures the backend's URL to configure API calls
      - key: VITE_API_URL
        fromService:
          type: web
          name: voyagex-backend
          envVarKey: RENDER_EXTERNAL_URL
